<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Theo — opener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050507;
      --text: #f4f4f6;
      --text-2: #9b9ba3;
      --text-3: #5c5c64;
      --accent: #00e58f;
      --accent-glow: rgba(0, 229, 143, 0.55);
    }
    html, body {
      width: 100vw;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Atmospheric gradient mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 18% 28%, rgba(0, 229, 143, 0.085), transparent 60%),
        radial-gradient(ellipse 50% 40% at 82% 78%, rgba(0, 229, 143, 0.045), transparent 60%),
        radial-gradient(ellipse 80% 60% at 50% 50%, rgba(255, 255, 255, 0.012), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='240' height='240' filter='url(%23n)' opacity='0.42'/></svg>");
      opacity: 0.035;
      pointer-events: none;
      mix-blend-mode: overlay;
      z-index: 0;
    }

    .slide {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: clamp(28px, 4.5vmin, 64px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      z-index: 1;
    }

    .corner {
      font-family: "Geist Mono", ui-monospace, monospace;
      font-size: clamp(10px, 0.78vw, 14px);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-3);
      white-space: nowrap;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2em;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 0.85em;
    }

    .pulse {
      width: clamp(6px, 0.55vw, 9px);
      height: clamp(6px, 0.55vw, 9px);
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
      flex-shrink: 0;
      position: relative;
    }
    .pulse::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 1.5px solid var(--accent);
      animation: ping 2.4s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1);   opacity: 0.9; }
      80%  { transform: scale(3.2); opacity: 0; }
      100% { transform: scale(3.2); opacity: 0; }
    }

    .center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding-left: clamp(0px, 4vw, 80px);
      gap: clamp(20px, 3.2vh, 40px);
    }

    .eyebrow {
      font-family: "Geist Mono", ui-monospace, monospace;
      font-size: clamp(11px, 0.85vw, 15px);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--text-2);
    }

    .headline {
      font-family: "Instrument Serif", Georgia, serif;
      font-weight: 400;
      font-size: clamp(48px, 8.4vw, 168px);
      line-height: 0.95;
      letter-spacing: -0.018em;
      max-width: 16ch;
      color: var(--text);
    }
    .headline em {
      color: var(--accent);
      font-style: italic;
      text-shadow: 0 0 38px rgba(0, 229, 143, 0.25);
    }

    .caption {
      display: flex;
      align-items: center;
      gap: 0.85em;
      font-family: "Geist Mono", ui-monospace, monospace;
      font-size: clamp(11px, 0.92vw, 15px);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-2);
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 2em;
    }

    .tagline {
      font-family: "Geist Mono", ui-monospace, monospace;
      font-size: clamp(11px, 0.92vw, 15px);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text);
      text-align: right;
    }
    .tagline .sep {
      color: var(--text-3);
      margin: 0 0.55em;
    }
    .tagline .accent {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="slide">
    <header class="top">
      <div class="brand-mark">
        <span class="pulse" aria-hidden="true"></span>
        <span class="corner">hallo theo · Applied AI Hackathon · Berlin · 2026</span>
      </div>
      <span class="corner">Track · ElevenLabs</span>
    </header>

    <section class="center">
      <div class="eyebrow">A new tenant-ops layer</div>
      <h1 class="headline">
        We taught the building to <em>answer the phone.</em>
      </h1>
      <div class="caption">
        <span class="pulse" aria-hidden="true"></span>
        <span>Live demo &nbsp;→</span>
      </div>
    </section>

    <footer class="bottom">
      <span class="corner">Theo &nbsp;·&nbsp; Your AI Hausmeister</span>
      <span class="tagline">
        Always on <span class="sep">·</span> Always honest <span class="sep">·</span>
        <span class="accent">Never overcommits.</span>
      </span>
    </footer>
  </main>
</body>
</html>
